name: CD - Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_tests:
        description: 'Skip tests and go straight to deployment?'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Verify code before deployment
  pre-deployment-checks:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:latest
          extensions: pdo_mysql, zip, bcmath

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run quick lint check
        run: ./vendor/bin/pint --test

      - name: Setup test environment
        run: cp .env.example .env && php artisan key:generate

      - name: Run tests
        run: php artisan test --without-tty

      - name: Create deployment summary
        run: |
          echo "✅ All pre-deployment checks passed" > deployment_summary.txt
          echo "Commit: ${{ github.sha }}" >> deployment_summary.txt
          echo "Branch: ${{ github.ref }}" >> deployment_summary.txt
          echo "Author: ${{ github.actor }}" >> deployment_summary.txt

      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment_summary.txt

  # Build and push Docker image
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to production
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: https://${{ secrets.DEPLOY_HOST }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment environment file
        run: |
          mkdir -p deploy
          cat > deploy/.env.deploy << EOF
          SSH_HOST=${{ secrets.DEPLOY_HOST }}
          SSH_USER=${{ secrets.DEPLOY_USER }}
          SSH_KEY=${{ runner.temp }}/deploy_key
          DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}
          GIT_BRANCH=${{ github.ref_name }}
          BUILD_IMAGES=false
          DOCKER_REGISTRY=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DB_PASSWORD=${{ secrets.DEPLOY_DB_PASSWORD }}
          APP_KEY=${{ secrets.DEPLOY_APP_KEY }}
          LOG_DIR=./deploy/logs
          EOF
          chmod 600 deploy/.env.deploy

      - name: Run deployment script
        run: |
          chmod +x deploy/deploy.sh
          ./deploy/deploy.sh

      - name: Run health checks
        run: |
          chmod +x deploy/health_check.sh
          ./deploy/health_check.sh "https://${{ secrets.DEPLOY_HOST }}"

      - name: Create deployment notification
        if: always()
        run: |
          cat > deployment_notification.txt << EOF
          🚀 Deployment Completed
          
          Environment: production
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Branch: ${{ github.ref }}
          URL: https://${{ secrets.DEPLOY_HOST }}
          
          Status: ${{ job.status }}
          EOF

      - name: Upload deployment log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs
          path: deploy/deploy_*.log
          retention-days: 30

      - name: Notify Slack (Success)
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Production Deployment Successful",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Deployment Successful"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*URL:*\nhttps://${{ secrets.DEPLOY_HOST }}"
                    }
                  ]
                }
              ]
            }

      - name: Notify Slack (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Production Deployment Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Deployment Failed"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Check logs for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

  # Rollback on failure
  rollback:
    name: Rollback on Deployment Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Perform rollback
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.DEPLOY_PATH }} && \
            docker compose down && \
            git revert --no-edit HEAD || git reset --hard HEAD~1 && \
            docker compose up -d && \
            sleep 5 && \
            docker compose exec -T app php artisan migrate --force || true
          "

      - name: Notify Slack (Rollback)
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "🔄 Deployment Rolled Back",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🔄 Deployment Rolled Back"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Previous version restored to ${{ secrets.DEPLOY_HOST }}"
                  }
                }
              ]
            }
